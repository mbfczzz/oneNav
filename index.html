<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="keywords"
      content="自由墨客,OneNav,ZMark,自由职业工具,一人公司,独立开发工具"
    />
    <meta
      name="description"
      content="自由墨客 ZMark —— 面向中文独立开发者与自由职业者的书签 / 网址导航管理器"
    />
    <title>自由墨客</title>
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition: opacity 0.3s ease;
      }
      #app-loading.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loading .spinner {
        width: 42px;
        height: 42px;
        border: 3px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: app-spin 0.8s linear infinite;
      }
      #app-loading .text {
        margin-top: 14px;
        color: #6b7280;
        font-size: 14px;
        letter-spacing: 0.05em;
      }
      @keyframes app-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Loading shell shown until the Vue app mounts (mirrors the original #app-loading). -->
    <div id="app-loading">
      <div class="spinner"></div>
      <div class="text">加载中...</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
